name: CI

# Draait bij elke push naar main en bij elke PR
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Type-check, lint en testen
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["22"]

    steps:
      # -----------------------------------------------------------------------
      # 1. Repo ophalen
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Node.js 22 (LTS) instellen met npm-cache
      # -----------------------------------------------------------------------
      - name: Node.js ${{ matrix.node-version }} instellen
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # -----------------------------------------------------------------------
      # 3. Exacte dependencies installeren (lockfile)
      #
      # NOTE: wanneer package-lock.json op macOS wordt geregenereerd, gebruik:
      #   npm install --package-lock-only --os=linux --libc=glibc --cpu=x64
      # Anders worden Linux-only optionele deps (@emnapi/core, @emnapi/runtime)
      # weggelaten en faalt `npm ci` op deze Ubuntu-runner.
      # -----------------------------------------------------------------------
      - name: Installeer dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 4. TypeScript type-check
      # -----------------------------------------------------------------------
      - name: TypeScript type-check
        run: npm run typecheck

      # -----------------------------------------------------------------------
      # 5. Lint (tijdelijk echo — ESLint wordt toegevoegd in volgende PR)
      # -----------------------------------------------------------------------
      - name: Lint
        run: npm run lint

      # -----------------------------------------------------------------------
      # 6. Unittests met Vitest
      # -----------------------------------------------------------------------
      - name: Testen
        run: npm test

      # -----------------------------------------------------------------------
      # 7. Testdekking rapporteren als artifact
      # -----------------------------------------------------------------------
      - name: Upload testdekking
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
